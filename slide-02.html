<!doctype html><html lang="ko"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>문제 상황</title><link rel="stylesheet" href="./assets/deck.css" /></head><body><main class="slide"><section class="stage"><div class="meta"><span class="section">WHY</span><span class="count">02 / 11</span></div><div class="content"><h1 class="big-title">문제 상황</h1><p class="headline">발표자료/문서에는 맞는 문장, 틀린 수치, 근거 없는 말, 100% 과장이 같이 섞임.</p></div><div class="line-list"><div class="line-item"><span class="num">01</span><div><h2>기술 수치가 틀림</h2><p>인용 수치, 통계, 날짜, 연구 결과 등 사실 확인이 필요한 정보가 발표 자료 속에 섞임.</p></div></div><div class="line-item"><span class="num">02</span><div><h2>과장 표현이 섞임</h2><p>100%, 완전 자동, 모든 오류 같은 표현은 근거 없으면 보장하기 어려움.</p></div></div><div class="line-item"><span class="num">03</span><div><h2>수동 검토가 느림</h2><p>자료 전체를 사람이 하나씩 근거와 대조하기 어려움.</p></div></div></div></section></main></body></html>
