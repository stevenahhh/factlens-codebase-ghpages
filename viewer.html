<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .viewer-container { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .nav-bar { height: 48px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 16px; flex-shrink: 0; z-index: 100; position: relative; }
    .nav-bar button { background: #333; color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
    .nav-bar button:hover { background: #555; }
    .nav-bar button:disabled { opacity: 0.3; cursor: default; }
    .slide-counter { color: #aaa; font-size: 14px; font-weight: 500; min-width: 60px; text-align: center; }
    .btn-fullscreen { position: absolute; right: 16px; background: transparent !important; font-size: 18px; padding: 6px 10px !important; }
    .slide-viewport { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .slide-scaler { width: 720pt; height: 405pt; position: relative; transform-origin: center center; }
    .slide-frame { position: absolute; inset: 0; width: 720pt; height: 405pt; border: none; overflow: hidden; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
    .slide-frame.active { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
<div class="viewer-container">
  <div class="nav-bar">
    <button id="btn-prev" disabled>← Prev</button>
    <span class="slide-counter" id="counter">1 / 11</span>
    <button id="btn-next">Next →</button>
    <button class="btn-fullscreen" id="btn-fs" title="Fullscreen (F)">⛶</button>
  </div>
  <div class="slide-viewport" id="viewport">
    <div class="slide-scaler" id="scaler">
      <iframe class="slide-frame active" id="frame-1"  src="slide-01.html"></iframe>
      <iframe class="slide-frame"        id="frame-2"  src="slide-02.html"></iframe>
      <iframe class="slide-frame"        id="frame-3"  src="slide-03.html"></iframe>
      <iframe class="slide-frame"        id="frame-4"  src="slide-04.html"></iframe>
      <iframe class="slide-frame"        id="frame-5"  src="slide-05.html"></iframe>
      <iframe class="slide-frame"        id="frame-6"  src="slide-06.html"></iframe>
      <iframe class="slide-frame"        id="frame-7"  src="slide-07.html"></iframe>
      <iframe class="slide-frame"        id="frame-8"  src="slide-08.html"></iframe>
      <iframe class="slide-frame"        id="frame-9"  src="slide-09.html"></iframe>
      <iframe class="slide-frame"        id="frame-10" src="slide-10.html"></iframe>
      <iframe class="slide-frame"        id="frame-11" src="slide-11.html"></iframe>
    </div>
  </div>
</div>
<script>
  const TOTAL = 11;
  let current = 1;

  const counter  = document.getElementById('counter');
  const btnPrev  = document.getElementById('btn-prev');
  const btnNext  = document.getElementById('btn-next');
  const btnFs    = document.getElementById('btn-fs');
  const scaler   = document.getElementById('scaler');

  function goTo(n) {
    document.getElementById('frame-' + current).classList.remove('active');
    current = n;
    document.getElementById('frame-' + current).classList.add('active');
    counter.textContent = current + ' / ' + TOTAL;
    btnPrev.disabled = current === 1;
    btnNext.disabled = current === TOTAL;
  }

  btnPrev.addEventListener('click', () => current > 1    && goTo(current - 1));
  btnNext.addEventListener('click', () => current < TOTAL && goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  { if (current < TOTAL) goTo(current + 1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    { if (current > 1)     goTo(current - 1); }
    if (e.key === 'f' || e.key === 'F') btnFs.click();
  });

  btnFs.addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  });

  function rescale() {
    const vw = window.innerWidth;
    const vh = window.innerHeight - 48;
    const sw = 720 * 96 / 72;
    const sh = 405 * 96 / 72;
    const scale = Math.min(vw / sw, vh / sh);
    scaler.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', rescale);
  rescale();
</script>
</body>
</html>
